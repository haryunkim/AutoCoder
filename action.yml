name: 'AutoCoder'
description: 'Generate code from labeled GitHub issues with OpenAI, commit the changes, and open a pull request.'
author: 'haryunkim'
branding:
  icon: 'cpu'
  color: 'green'

inputs:
  GITHUB_TOKEN:
    description: 'Personal access token (PAT) used for GitHub API authentication. This token is required to create pull requests and handle other repository interactions.'
    required: true
  REPOSITORY:
    description: 'The repository where the action will be executed (owner/repo format).'
    required: true
  ISSUE_NUMBER:
    description: 'The number of the issue that triggered the action.'
    required: true
  OPENAI_API_KEY:
    description: 'API key for OpenAI, enabling interactions with the ChatGPT service to generate code based on issue descriptions.'
    required: true
  SCRIPT_PATH:
    description: 'The path to the script that interacts with ChatGPT and generates code.'
    required: true
    default: 'scripts/script.sh'
  LABEL:
    description: 'Allows users to customize the label that triggers the action.'
    required: true
    default: 'autocoder-bot'
  OUTPUT_DIR:
    description: 'Directory where generated files are written before commit.'
    required: false
    default: 'autocoder-artifact'
  BASE_BRANCH:
    description: 'Base branch for the generated pull request.'
    required: false
    default: 'main'

outputs:
  pull_request_url:
    description: 'The URL of the pull request created by this action.'
    value: ${{ steps.create_pr.outputs.pull-request-url }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ inputs.GITHUB_TOKEN }}
        fetch-depth: 0
        persist-credentials: true

    - name: Validate trigger label
      shell: bash
      env:
        EVENT_LABEL: ${{ github.event.label.name }}
        ISSUE_LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
      run: |
        if [ "$EVENT_LABEL" = "${{ inputs.LABEL }}" ]; then
          echo "Matched trigger label from issue label event: $EVENT_LABEL"
          exit 0
        fi

        if echo "$ISSUE_LABELS_JSON" | jq -e --arg label "${{ inputs.LABEL }}" 'index($label) != null' > /dev/null; then
          echo "Matched trigger label from issue labels list."
          exit 0
        fi

        if [ -z "$EVENT_LABEL" ]; then
          echo "Skipping run because no matching issue label was found for '${{ inputs.LABEL }}'."
          exit 0
        else
          echo "Skipping run because event label '$EVENT_LABEL' does not match required label '${{ inputs.LABEL }}'."
          exit 0
        fi

    - name: Make script executable
      shell: bash
      run: chmod +x "${{ github.action_path }}/${{ inputs.SCRIPT_PATH }}"

    - name: Run AutoCoder script
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.OUTPUT_DIR }}
      run: |
        "${{ github.action_path }}/${{ inputs.SCRIPT_PATH }}" \
          "${{ inputs.GITHUB_TOKEN }}" \
          "${{ inputs.REPOSITORY }}" \
          "${{ inputs.ISSUE_NUMBER }}" \
          "${{ inputs.OPENAI_API_KEY }}"

    - name: Configure Git and commit generated files
      shell: bash
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "autocoder-bot"
        git add .
        git commit -m "Add code snippets for issue #${{ inputs.ISSUE_NUMBER }}" || echo "No changes to commit"

    - id: create_pr
      name: Create pull request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.GITHUB_TOKEN }}
        branch: autocoder-branch-${{ inputs.ISSUE_NUMBER }}
        base: ${{ inputs.BASE_BRANCH }}
        labels: ${{ inputs.LABEL }}
        title: Add code snippets for issue #${{ inputs.ISSUE_NUMBER }}
        commit-message: Add code snippets for issue #${{ inputs.ISSUE_NUMBER }}
        add-paths: ${{ inputs.OUTPUT_DIR }}